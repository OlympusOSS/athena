name: CI — Athena

on:
  push:
    tags-ignore: ['v*']
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'Containerfile'
      - 'next.config.*'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Configure npm for GitHub Packages
        run: |
          echo "@olympusoss:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - name: Cookie audit — no unguarded athena-session writes
        run: bun run audit:cookies
      - name: Run unit tests
        run: bun run test
      - name: Run unit tests with coverage (80% threshold gate)
        run: bun run test:coverage
      - run: bun run build
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run E2E tests
        run: bun run test:e2e
        env:
          CI: true
      - name: "CSP gate: verify unsafe-eval is absent from production middleware bundle"
        run: |
          MIDDLEWARE_JS=".next/server/middleware.js"
          if [ ! -f "$MIDDLEWARE_JS" ]; then
            echo "FAIL: $MIDDLEWARE_JS not found after build — middleware may not be compiled."
            exit 1
          fi
          if grep -q "unsafe-eval" "$MIDDLEWARE_JS"; then
            echo "FAIL: 'unsafe-eval' found in production middleware bundle."
            echo "The buildCsp() function must NOT emit unsafe-eval when NODE_ENV=production."
            echo "Matches:"
            grep -n "unsafe-eval" "$MIDDLEWARE_JS"
            exit 1
          fi
          echo "PASS: No 'unsafe-eval' in $MIDDLEWARE_JS"

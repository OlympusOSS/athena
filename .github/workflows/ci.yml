name: CI — Athena

on:
  push:
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Configure npm for GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run build

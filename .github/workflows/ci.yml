name: CI — Athena

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'tests/**'
      - 'scripts/**'
      - 'package.json'
      - 'bun.lock'
      - 'Containerfile'
      - 'next.config.*'
      - 'playwright.config.*'
      - 'vitest.config.*'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  # Deterministic fixtures for tests that read env. NOT used at runtime.
  # Values here MUST match vitest.config.ts `test.env` + tests/global-setup.ts —
  # mismatch causes the test.env override to race with external env and break
  # session-crypto round-trips (sign with key A, verify with key B).
  ENCRYPTION_KEY: "test-encryption-key-for-vitest-32ch"
  SESSION_SIGNING_KEY: "y0vXvDE6hGnlA4J/iLlTwyMXHgDrMp4tD3ON+3lf3ws="
  TZ: "UTC"
  OAUTH_CLIENT_ID: "test-client"
  OAUTH_CLIENT_SECRET: "test-secret"
  AUTH_HYDRA_URL: "http://localhost:4445"
  IAM_HYDRA_PUBLIC_URL: "http://localhost:3103"
  AUTH_KRATOS_ADMIN_URL: "http://localhost:4434"
  IAM_KRATOS_ADMIN_URL: "http://localhost:3101"
  NEXT_PUBLIC_APP_URL: "http://localhost:4001"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Configure npm for GitHub Packages
        run: |
          echo "@olympusoss:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - name: Cookie audit — no unguarded athena-session writes
        run: bun run audit:cookies
      - name: Run unit tests
        run: bun run test
      - name: Snapshot coverage gate (100%)
        run: bun run snapshot-coverage
      - name: Run unit tests with coverage (100/100/100/90 threshold gate)
        run: bun run test:coverage
      - run: bun run build
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run E2E tests
        run: bun run test:e2e
        env:
          CI: true
      - name: "CSP gate: verify unsafe-eval is absent from production middleware bundle"
        run: |
          # Next 16 outputs middleware at .next/server/src/middleware.js
          # (source path preserved). Fall back to the older flat path.
          if [ -f ".next/server/src/middleware.js" ]; then
            MIDDLEWARE_JS=".next/server/src/middleware.js"
          elif [ -f ".next/server/middleware.js" ]; then
            MIDDLEWARE_JS=".next/server/middleware.js"
          else
            echo "FAIL: middleware.js not found in .next/server/src/ or .next/server/"
            find .next/server -name "middleware*.js" -maxdepth 3 2>/dev/null || true
            exit 1
          fi
          if grep -q "unsafe-eval" "$MIDDLEWARE_JS"; then
            echo "FAIL: 'unsafe-eval' found in production middleware bundle ($MIDDLEWARE_JS)."
            echo "The buildCsp() function must NOT emit unsafe-eval when NODE_ENV=production."
            echo "Matches:"
            grep -n "unsafe-eval" "$MIDDLEWARE_JS"
            exit 1
          fi
          echo "PASS: No 'unsafe-eval' in $MIDDLEWARE_JS"
